services:
    backend:
      image: node:alpine
      volumes:
        - .:/app
      working_dir: /app
      command: sh scripts/docker-entrypoint.sh
      ports:
        - "3008:3000"
        - "3009:9229"
      environment:
        NODE_ENV: development
        PORT: "3000"
        DATABASE_URL: postgres://postgres:postgres@db/decode
        MONGO_URL: mongodb://root:password@mongo:27017/decode?authSource=admin
        JWT_SECRET: myVeryVeryStrongSecret!
        FRONTEND_URL: "http://localhost:3000"
        SMTP_HOST: sandbox.smtp.mailtrap.io
        SMTP_PORT: "2525"
        SMTP_SECURE: "false"
        SMTP_USER: your-mailtrap-user
        SMTP_PASS: your-mailtrap-password
        MAIL_FROM: "Decode Analytics <noreply@decode.local>"
        MAIL_TEST_TO: test@example.com
      depends_on:
        - db
        - mongo

    db:
      image: postgres:17-alpine
      ports:
        - "127.0.0.1:5432:5432"
      volumes:
        - db-data:/var/lib/postgresql/data
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: decode

    mongo:
      image: mongo
      ports:
        - "127.0.0.1:27019:27017"
      volumes:
        - mongo-data:/data/db
      environment:
        MONGO_INITDB_ROOT_USERNAME: root
        MONGO_INITDB_ROOT_PASSWORD: password

volumes:
  db-data: {}
  mongo-data: {}
