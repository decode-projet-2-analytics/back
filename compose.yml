services:
    backend:
      image: node:alpine
      volumes:
        - .:/app
      working_dir: /app
      command: npm run dev
      ports:
        - "3008:3000"
        - "3009:9229"
      environment:
        - NODE_ENV=development
        - PORT=3000
        - DATABASE_URL=postgres://postgres:postgres@db/decode
        - JWT_SECRET=myVeryVeryStrongSecret!
      depends_on:
        - db

    db:
      image: postgres:17-alpine
      volumes:
        - db-data:/var/lib/postgresql/data
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - POSTGRES_DB=decode


volumes:
  db-data: {}
        
      