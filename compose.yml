services:
    backend:
      image: node:alpine
      volumes:
        - .:/app
      working_dir: /app
      command: sh scripts/docker-entrypoint.sh
      ports:
        - "3008:3000"
        - "3009:9229"
      environment:
        NODE_ENV: development
        PORT: "3000"
        DATABASE_URL: postgres://postgres:postgres@db/decode
        MONGO_URL: mongodb://mongo:27017/decode?replicaSet=rs0
        JWT_SECRET: myVeryVeryStrongSecret!
        FRONTEND_URL: "http://localhost:3000"
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: "587"
        SMTP_SECURE: "false"
        SMTP_REQUIRE_TLS: "true"
        SMTP_AUTH_METHOD: LOGIN
        SMTP_USER: ${SMTP_USER:-}
        SMTP_PASS: ${SMTP_PASS:-}
        MAIL_FROM: ${MAIL_FROM:-}
        MAIL_TEST_TO: ${MAIL_TEST_TO:-}
      depends_on:
        db:
          condition: service_started
        mongo:
          condition: service_healthy

    db:
      image: postgres:17-alpine
      ports:
        - "127.0.0.1:5432:5432"
      volumes:
        - db-data:/var/lib/postgresql/data
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: decode

    mongo:
      image: mongo
      command: ["--replSet", "rs0", "--bind_ip_all"]
      ports:
        - "127.0.0.1:27019:27017"
      volumes:
        - mongo-data:/data/db
      healthcheck:
        test: >
          mongosh --quiet --port 27017 --eval
          "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }).ok }"
        interval: 5s
        timeout: 30s
        start_period: 5s
        retries: 30

volumes:
  db-data: {}
  mongo-data: {}
